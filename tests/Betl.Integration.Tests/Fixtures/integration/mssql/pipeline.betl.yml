betl: 1
name: integration-mssql
description: >
  End-to-end SQL Server round-trip: sql.execute DDL+seed, mssql.upsert (Update
  mode, exercises MERGE ... WHEN MATCHED THEN UPDATE), mssql.read, and
  mssql.lookup against a reference table. UpdateIfChanged is exercised by a
  second upsert pass with two changed rows + three unchanged rows.

parameters:
  dsn: { type: string, required: true }
  out: { type: string, required: true }

connections:
  warehouse:
    type: mssql
    dsn: ${params.dsn}

pipeline:
  - id: ddl
    type: sql.execute
    connection: warehouse
    sql: |
      IF OBJECT_ID('orders', 'U') IS NOT NULL DROP TABLE orders;
      IF OBJECT_ID('customers', 'U') IS NOT NULL DROP TABLE customers;
      CREATE TABLE customers (id INT PRIMARY KEY, name NVARCHAR(64), region NVARCHAR(8));
      CREATE TABLE orders (order_id INT PRIMARY KEY, customer_id INT, amount INT);
      INSERT INTO customers (id, name, region) VALUES (1, N'Alice', N'us'), (2, N'Bob', N'eu'), (3, N'Charlie', N'jp');

  - id: seed_orders
    type: dataflow
    after: [ddl]
    steps:
      - id: gen
        type: betl.gen_int64
        n: 5
        column: order_id
        start: 1
      - id: enrich
        type: map
        from: gen
        add:
          customer_id: { lang: ssisexpr, expr: '((order_id - 1) % 3) + 1' }
          amount:      { lang: ssisexpr, expr: 'order_id * 100' }
      - id: upsert
        type: mssql.upsert
        from: enrich
        connection: warehouse
        table: orders
        key: [order_id]
        on_conflict: update

  - id: bump_two
    type: dataflow
    after: [seed_orders]
    steps:
      - id: gen
        type: betl.gen_int64
        n: 5
        column: order_id
        start: 1
      - id: enrich
        type: map
        from: gen
        add:
          customer_id: { lang: ssisexpr, expr: '((order_id - 1) % 3) + 1' }
          amount:      { lang: ssisexpr, expr: 'order_id <= 2 ? order_id * 1000 : order_id * 100' }
      - id: upsert_iff
        type: mssql.upsert
        from: enrich
        connection: warehouse
        table: orders
        key: [order_id]
        on_conflict: update_if_changed

  - id: verify
    type: sql.execute
    connection: warehouse
    sql: SELECT COUNT(*) AS n FROM orders
    after: [bump_two]
    expect:
      n: 5

  - id: enrich_flow
    type: dataflow
    after: [verify]
    steps:
      - id: rd
        type: mssql.read
        connection: warehouse
        sql: SELECT order_id, customer_id, amount FROM orders ORDER BY order_id
      - id: lk
        type: lookup
        from: rd
        connection: warehouse
        table: customers
        match: { customer_id: id }
        select: { name: name, region: region }
        on_miss: error
      - id: write
        type: csv.write
        from: lk
        path: ${params.out}
