betl: 1
name: phase5-dotnet-pipelinecomponent
description: betl.gen_int64 -> Roslyn-compiled BetlPipelineComponent -> csv.write.

parameters:
  out: { type: string, required: true }

pipeline:
  - id: flow
    type: dataflow
    steps:
      - id: gen
        type: betl.gen_int64
        n: 5
        column: n
        start: 0
      - id: pc
        type: dotnet.pipelinecomponent
        from: gen
        output_schema:
          - { name: n,  type: int64 }
          - { name: sq, type: int64 }
        source: |
          public class UserComp : BetlPipelineComponent
          {
              public override void ProcessInput(BetlPipelineBuffer buf)
              {
                  while (buf.NextRow())
                  {
                      long n = buf.GetInt64(0);
                      buf.AddOutputRow(new object?[] { n, n * n });
                  }
              }
          }
      - id: write
        type: csv.write
        from: pc
        path: ${params.out}
