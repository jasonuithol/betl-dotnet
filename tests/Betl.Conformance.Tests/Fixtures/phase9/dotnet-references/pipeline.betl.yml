betl: 1
name: phase9-dotnet-references
description: dotnet.script that uses a type from an external DLL via `references:`.

parameters:
  helper_dll: { type: string, required: true }
  out:        { type: string, required: true }

pipeline:
  - id: flow
    type: dataflow
    steps:
      - id: gen
        type: betl.gen_int64
        n: 3
        column: n
        start: 1
      - id: greet
        type: dotnet.script
        from: gen
        lang: csharp
        references:
          - ${params.helper_dll}
        output_schema:
          - { name: n,       type: int64 }
          - { name: message, type: string }
        source: |
          using Betl.Test.Helper;
          public class GreetScript : BetlScript
          {
              public override IEnumerable<object?[]> OnRow(IReadOnlyList<object?> row)
              {
                  long n = (long)row[0]!;
                  yield return new object?[] { n, Greeter.Greet("row " + n) };
              }
          }
      - id: write
        type: csv.write
        from: greet
        path: ${params.out}
