betl: 1
name: phase9-dotnet-packages
description: dotnet.script that uses Humanizer.Core (resolved via NuGet) to pluralize per-row.

parameters:
  out: { type: string, required: true }

pipeline:
  - id: flow
    type: dataflow
    steps:
      - id: gen
        type: betl.gen_int64
        n: 3
        column: n
        start: 1
      - id: pluralize
        type: dotnet.script
        from: gen
        lang: csharp
        packages:
          - Humanizer.Core@2.14.1
        output_schema:
          - { name: n,    type: int64 }
          - { name: text, type: string }
        source: |
          using Humanizer;
          public class PluralScript : BetlScript
          {
              public override IEnumerable<object?[]> OnRow(IReadOnlyList<object?> row)
              {
                  long n = (long)row[0]!;
                  yield return new object?[] { n, "item".ToQuantity((int)n) };
              }
          }
      - id: write
        type: csv.write
        from: pluralize
        path: ${params.out}
